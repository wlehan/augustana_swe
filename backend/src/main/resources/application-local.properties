spring.datasource.url=jdbc:h2:mem:golfdb;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

app.jwt.secret=${JWT_SECRET:dev-only-jwt-secret-change-me-12345678901234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/local

server.port=8080
